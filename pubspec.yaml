name: rafeeq
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.2+0

environment:
  sdk: ^3.10.4
 

dependencies:
  flutter:
    sdk: flutter 
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  riverpod: ^3.1.0
  flutter_riverpod: ^3.1.0 
  hijri_date: ^1.0.0
  shimmer: ^3.0.0 
  hive: ^2.2.3
  hive_generator: ^2.0.1
  hive_flutter: ^1.1.0
  build_runner: ^2.4.13
  analyzer: ^6.4.1
  collection: ^1.19.1
  scrollable_positioned_list:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
 

flutter:

  uses-material-design: true
  fonts:
    - family: Uthmani
      fonts:
        - asset: assets/fonts/uthmani_font.otf

  assets: 
    - assets/images/salam_amber.png
    - assets/images/salam_black.png
    - assets/images/kaaba.jpeg
    - assets/images/kaaba_2.jpeg
    - assets/images/bismillah_1.png
    - assets/images/bismillah_dark.png
    - assets/images/quran.png
    - assets/images/quran_book.png
    - assets/images/mosque.png
    - .env

    - assets/images/category/daily.png
    - assets/images/category/sunrise.png
    - assets/images/category/sunset.png

    - assets/adhkar/general.json
    - assets/adhkar/evening.json
 
 