name: rafeeq
description: "An Islamic companion app."
publish_to: "none"

version: 1.0.6+0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  riverpod: ^3.1.0
  flutter_riverpod: ^3.1.0
  hijri_date: ^1.0.0
  shimmer: ^3.0.0
  hive: ^2.2.3
  hive_generator: ^2.0.1
  hive_flutter: ^1.1.0
  build_runner: ^2.4.13
  analyzer: ^6.4.1
  collection: ^1.19.1
  scrollable_positioned_list:
  carousel_slider: ^5.1.1
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  dio: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Uthmani
      fonts:
        - asset: assets/fonts/uthmani_font.otf

  assets:
    - assets/images/salam_amber.png
    - assets/images/salam_black.png
    - assets/images/kaaba.jpeg
    - assets/images/kaaba_2.jpeg
    - assets/images/bismillah_1.png
    - assets/images/bismillah_dark.png
    - assets/images/quran.png
    - assets/images/quran_book.png
    - assets/images/mosque.png

    - assets/images/quran/surah_details.jpeg
    - assets/salat/fajr.jpeg
    - assets/salat/dhuhr.jpeg
    - assets/salat/asr.jpeg
    - assets/salat/maghrib.jpeg
    - assets/salat/isha.jpeg
    - assets/salat/isha_2.jpeg

    - .env

    - assets/images/category/daily.png
    - assets/images/category/sunrise.png
    - assets/images/category/sunset.png

    - assets/adhkar/general.json
    - assets/adhkar/morning.json
    - assets/adhkar/evening.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#050C0E"
  image: assets/icon/app_splash_icon.png
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

  android_12:
    image: assets/icon/app_splash_icon.png
    icon_background_color: "#050C0E" # background behind icon
