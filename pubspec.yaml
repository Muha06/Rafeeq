name: rafeeq
description: "An Islamic companion app."
publish_to: "none"

version: 1.0.12+3

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  riverpod: ^3.1.0
  flutter_riverpod: ^3.1.0
  hijri_date: ^1.0.0
  shimmer: ^3.0.0
  hive: ^2.2.3
  hive_generator: ^2.0.1
  hive_flutter: ^1.1.0
  build_runner: ^2.4.13
  analyzer: ^6.4.1
  collection: ^1.19.1
  scrollable_positioned_list:
  carousel_slider: ^5.1.1
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  dio: ^5.9.0
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  just_audio: ^0.10.5
  supabase_flutter: ^2.0.0
  font_awesome_flutter: ^10.12.0 
  country_picker: ^2.0.27
  youtube_player_iframe: ^5.2.2
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2
  webview_flutter_android: ^4.10.11
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  widgets_to_image: ^2.0.1
  table_calendar: ^3.2.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Uthmani
      fonts:
        - asset: assets/fonts/uthmani_font.otf

  assets:
    - assets/images/
    - assets/images/adhkar/
    - assets/images/category/
    - assets/images/home/
    - assets/images/quran/
    - assets/images/salat/
    - assets/images/onboarding/
    - assets/adhkar/ 

    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#050C0E"
  image: assets/icon/app_splash_icon.png
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

  android_12:
    image: assets/icon/app_splash_icon.png
    icon_background_color: "#050C0E" # background behind icon
