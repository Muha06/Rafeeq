name: rafeeq
description: "An Islamic companion app."
publish_to: "none"

version: 1.3.7+22

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  riverpod: ^3.1.0
  flutter_riverpod: ^3.1.0
  hijri_date: ^1.0.0
  shimmer: ^3.0.0
  hive: ^2.2.3
  hive_generator: ^2.0.1
  hive_flutter: ^1.1.0
  build_runner: ^2.4.13
  analyzer: ^6.4.1
  collection: ^1.19.1
  scrollable_positioned_list:
  carousel_slider: ^5.1.1
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  dio: ^5.9.0
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  just_audio: ^0.10.5
  supabase_flutter: ^2.0.0
  font_awesome_flutter: ^10.12.0
  country_picker: ^2.0.27
  youtube_player_iframe: ^5.2.2
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2
  webview_flutter_android: ^4.10.11
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  widgets_to_image: ^2.0.1
  table_calendar: ^3.2.0
  permission_handler: ^12.0.1
  phosphor_flutter: ^2.1.0
  arc_progress_bar_new: ^1.0.4
  fl_chart: ^1.1.1
  connectivity_plus: ^7.0.0
  package_info_plus: ^9.0.0
  firebase_analytics: ^12.1.2
  firebase_core: ^4.4.0
  firebase_crashlytics: ^5.0.7
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  sqflite: ^2.4.2
  path: ^1.9.1
  quran: ^1.4.1
  percent_indicator: ^4.2.5
  sleek_circular_slider: ^2.1.0 
  wakelock_plus: ^1.5.1
  video_player: ^2.11.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Uthmani
      fonts:
        - asset: assets/fonts/Uthmani.otf

    - family: Uthmani2
      fonts:
        - asset: assets/fonts/uthmani_hafs_2.ttf

    - family: Manrope
      fonts:
        - asset: assets/fonts/NotoSerif/NotoSerif-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSerif/NotoSerif-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSerif/NotoSerif-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSerif/NotoSerif-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSerif/NotoSerif-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/images/adhkar/
    - assets/images/category/
    - assets/images/home/
    - assets/images/quran/
    - assets/images/quran/pages/
    - assets/images/onboarding/
    - assets/adhkar/
    - assets/db/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#071013"
  image: assets/icon/app_splash.png
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

  android_12:
    image: assets/icon/app_splash.png
    icon_background_color: "#071013" # background behind icon
